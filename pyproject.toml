[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
# Sensible default rule set — pyflakes + pycodestyle + import sorting
select = ["E", "F", "I", "W", "UP"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"app/__init__.py" = ["F401"]
"app/routes/__init__.py" = ["F401"]
"app/utils/__init__.py" = ["F401"]